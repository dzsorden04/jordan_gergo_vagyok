<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Gergely</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* BAL OLDAL MENÜ */
.menu {
    position: absolute;
    left: 8%;
    top: 50%;
    transform: translateY(-50%);
    text-align: left;
}

.menu a, .menu div {
    display: block;
    margin: 15px 0;
    font-size: 22px;
    cursor: pointer;
    color: black;
    text-decoration: none;
}

/* JOBB OLDALI SLIDER */
.slider {
    position: absolute;
    right: 0;
    top: 0;
    width: 50%;
    height: 100vh;
}

.slider img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
}

/* GALÉRIA */
#gallery {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow-y: auto;
    text-align: center;
}

#gallery img {
    width: 200px;
    margin: 10px;
}

/* EGÉR VÍZ EFFEKT */
.trail {
    position: fixed;
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.08);
    border-radius: 50%;
    pointer-events: none;
    animation: fade 2s forwards;
}

@keyframes fade {
    from {opacity:1;}
    to {opacity:0;}
}

/* FOTO17 FLASH */
#flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="menu">

<a href="https://www.instagram.com/tebolyult.asvanykarkoto.fuggo/" target="_blank">Instagram</a>

<a href="https://www.vinted.hu/member/129409216" target="_blank">Vinted</a>

<div onclick="toggleGallery()">Munkáim</div>

</div>

<div class="slider">
<img id="sliderImg" src="foto1.png">
</div>

<div id="gallery">
<h2>Munkáim</h2>

<img src="foto1.png">
<img src="foto2.png">
<img src="foto3.png">
<img src="foto4.png">
<img src="foto5.png">
<img src="foto6.png">
<img src="foto7.bmp">
<img src="foto8.png">
<img src="foto9.png">
<img src="foto10.png">

</div>

<img id="flash" src="foto17.png">

<script>

// SLIDER (6 kép)
let imgs = [
"foto11.png","foto12.ico","foto13.png",
"foto14.ico","foto15.ico","foto16.png"
];

let i = 0;

setInterval(() => {
    i = (i + 1) % imgs.length;

    let img = document.getElementById("sliderImg");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = imgs[i];
        img.style.opacity = 1;
    }, 200);

}, 5000);

// GALÉRIA
function toggleGallery(){
    let g = document.getElementById("gallery");
    g.style.display = (g.style.display === "block") ? "none" : "block";
}

// EGÉR VÍZ
document.addEventListener("mousemove", (e) => {
    let d = document.createElement("div");
    d.className = "trail";
    d.style.left = (e.pageX - 20) + "px";
    d.style.top = (e.pageY - 20) + "px";

    document.body.appendChild(d);

    setTimeout(() => d.remove(), 2000);
});

// CLICK HANG
document.addEventListener("click", () => {
    let audio = new Audio("hang4.ogg");
    audio.volume = 0.2;
    audio.play();
});

// FOTO17 FLASH 2s
document.addEventListener("click", () => {
    let f = document.getElementById("flash");
    f.style.opacity = 0.4;

    setTimeout(() => {
        f.style.opacity = 0;
    }, 2000);
});

</script>

</body>
</html>
