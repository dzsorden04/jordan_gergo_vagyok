<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Gergely</title>

<style>
body {
    margin: 0;
    background: #ffd8a8;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* FEJLÉC */
header {
    height: 10vh;
    background: url("header.jpg") center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
}

/* BAL OLDAL MENÜ */
.menu {
    position: absolute;
    top: 10vh;
    left: 5%;
    width: 40%;
}

.menu a, .menu div {
    display: block;
    margin: 20px 0;
    font-size: 22px;
    cursor: pointer;
}

/* JOBB OLDALI AUTO SLIDER */
.slider {
    position: absolute;
    top: 10vh;
    right: 0;
    width: 50%;
    height: 90vh;
}

.slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ONLYFANS */
#onlyfans {
    position: relative;
}

/* GALÉRIA TELJES KÉPERNYŐ */
#gallery {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    align-items: center;
    justify-content: center;
}

#gallery img {
    max-width: 80%;
    max-height: 80%;
}

/* NYILAK */
.arrow {
    position: absolute;
    top: 50%;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

#left { left: 20px; }
#right { right: 20px; }

/* KILÉPÉS */
#close {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: red;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>ez itt a fejléc</header>

<div class="menu">
<a href="https://www.instagram.com/tebolyult.asvanykarkoto.fuggo/" target="_blank">Instagram</a>
<a href="https://www.vinted.hu/member/129409216" target="_blank">Vinted</a>
<div onclick="openGallery()">Munkáim</div>
<div id="onlyfans">OnlyFans</div>
</div>

<div class="slider">
<img id="sliderImg" src="foto1.png">
</div>

<div id="gallery">
<div id="left" class="arrow">&#8592;</div>
<img id="galleryImg" src="foto1.png">
<div id="right" class="arrow">&#8594;</div>
<div id="close">X</div>
</div>

<script>

// KATTINTÁS HANG (CSAK FŐOLDALON)
document.addEventListener("click", () => {
    if(document.getElementById("gallery").style.display !== "flex"){
        let audio = new Audio("hang1.mp3");
        audio.volume = 0.2;
        audio.play();
    }
});

// ONLYFANS MENEKÜL (CSÚSZVA)
const of = document.getElementById("onlyfans");

of.addEventListener("mouseover", () => {
    let x = Math.random() * 400;
    let y = Math.random() * 300;

    of.style.position = "relative";
    of.style.transition = "0.5s";
    of.style.left = x + "px";
    of.style.top = y + "px";
});

// AUTO SLIDER (JOBB OLDAL)
let sliderImages = ["foto1.png","foto2.png","foto3.png","foto4.png","foto5.png","foto6.png"];
let sIndex = 0;

setInterval(() => {
    sIndex = (sIndex + 1) % sliderImages.length;
    document.getElementById("sliderImg").src = sliderImages[sIndex];
}, 5000);

// GALÉRIA
let images = [
"foto1.png","foto2.png","foto3.png","foto4.png","foto5.png",
"foto6.png","foto7.png","foto8.png","foto9.png","foto10.png"
];

let index = 0;

function openGallery(){
    document.getElementById("gallery").style.display = "flex";
    document.getElementById("galleryImg").src = images[index];
}

document.getElementById("left").onclick = () => {
    index = (index - 1 + images.length) % images.length;
    document.getElementById("galleryImg").src = images[index];
};

document.getElementById("right").onclick = () => {
    index = (index + 1) % images.length;
    document.getElementById("galleryImg").src = images[index];
};

document.getElementById("close").onclick = () => {
    document.getElementById("gallery").style.display = "none";
};

</script>

</body>
</html>
