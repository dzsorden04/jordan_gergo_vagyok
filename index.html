<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Jordán Gergely</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:white;
    overflow:hidden;
    font-family:'UnifrakturCook', cursive;
}

/* FEJLÉC */

header{
    height:10vh;
    background:url("header.png") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:38px;
}

/* BAL MENÜ */

.menu{
    position:absolute;
    left:8%;
    top:50%;
    transform:translateY(-50%);
    z-index:5;
}

.menu a,
.menu div{
    display:block;
    margin:25px 0;
    font-size:42px;
    color:black;
    text-decoration:none;
    cursor:pointer;
    transition:0.2s;
}

.menu a:hover,
.menu div:hover{
    opacity:0.6;
}

/* ONLYFANS */

#onlyfans{
    position:relative;
}

/* JOBB OLDALI SLIDER */

.slider{
    position:absolute;
    right:0;
    top:10vh;
    width:52%;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:contain;
    transition:opacity 0.2s ease;
}

/* GALÉRIA */

#gallery{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:20;
    justify-content:center;
    align-items:center;
}

#gallery img{
    max-width:85%;
    max-height:85%;
    object-fit:contain;
}

/* NYILAK */

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:60px;
    color:black;
    cursor:pointer;
    user-select:none;
}

#leftArrow{
    left:30px;
}

#rightArrow{
    right:30px;
}

/* PIROS X */

#closeGallery{
    position:absolute;
    right:30px;
    bottom:20px;
    font-size:50px;
    color:red;
    cursor:pointer;
}

/* EGÉR EFFEKT */

.trail{
    position:fixed;
    width:40px;
    height:40px;
    background:rgba(0,0,0,0.08);
    border-radius:50%;
    pointer-events:none;
    animation:fade 2s forwards;
}

@keyframes fade{
    from{opacity:1;}
    to{opacity:0;}
}

/* KATTINTÓS FOTO17 */

#flashImage{
    position:fixed;
    width:260px;
    pointer-events:none;
    opacity:0;
    z-index:100;
}

</style>
</head>

<body>

<header>ez itt a fejléc</header>

<div class="menu">

<a href="https://www.instagram.com/tebolyult.asvanykarkoto.fuggo/" target="_blank">
Instagram
</a>

<a href="https://www.vinted.hu/member/129409216" target="_blank">
Vinted
</a>

<div onclick="openGallery()">
Munkáim
</div>

<div id="onlyfans">
OnlyFans
</div>

</div>

<!-- JOBB OLDALI AUTO SLIDER -->

<div class="slider">
<img id="sliderImg" src="foto1.png">
</div>

<!-- FULLSCREEN GALÉRIA -->

<div id="gallery">

<div id="leftArrow" class="arrow">&#8592;</div>

<img id="galleryImage" src="foto1.png">

<div id="rightArrow" class="arrow">&#8594;</div>

<div id="closeGallery">X</div>

</div>

<!-- FOTO17 -->

<img id="flashImage" src="foto17.png">

<script>

/* KATTINTÁS HANG */

document.addEventListener("click", () => {

    if(document.getElementById("gallery").style.display !== "flex"){

        let audio = new Audio("hang1.ogg");
        audio.volume = 0.12;
        audio.play();

    }

});

/* ONLYFANS MENEKÜLÉS */

const onlyfans = document.getElementById("onlyfans");

onlyfans.addEventListener("mouseover", () => {

    let x = Math.random() * 300;
    let y = Math.random() * 300;

    onlyfans.style.transition = "0.5s";
    onlyfans.style.left = x + "px";
    onlyfans.style.top = y + "px";

});

/* JOBB OLDALI SLIDER */

let sliderImages = [

"foto11.png",
"foto12.ico",
"foto13.png",
"foto14.ico",
"foto15.ico",
"foto18.png"
"header.png"
"foto20.png"
    
];

let sliderIndex = 0;

setInterval(() => {

    sliderIndex = (sliderIndex + 1) % sliderImages.length;

    let img = document.getElementById("sliderImg");

    img.style.opacity = 0;

    setTimeout(() => {

        img.src = sliderImages[sliderIndex];
        img.style.opacity = 1;

    }, 200);

}, 5000);

/* FULLSCREEN GALÉRIA */

let galleryImages = [

"foto1.png",
"foto2.png",
"foto3.png",
"foto4.png",
"foto5.png",
"foto6.png",
"foto7.bmp",
"foto8.png",
"foto19.png",
"foto16.png"

];

let currentImage = 0;

function openGallery(){

    document.getElementById("gallery").style.display = "flex";

    document.getElementById("galleryImage").src =
    galleryImages[currentImage];

}

document.getElementById("leftArrow").onclick = () => {

    currentImage--;

    if(currentImage < 0){
        currentImage = galleryImages.length - 1;
    }

    document.getElementById("galleryImage").src =
    galleryImages[currentImage];

};

document.getElementById("rightArrow").onclick = () => {

    currentImage++;

    if(currentImage >= galleryImages.length){
        currentImage = 0;
    }

    document.getElementById("galleryImage").src =
    galleryImages[currentImage];

};

document.getElementById("closeGallery").onclick = () => {

    document.getElementById("gallery").style.display = "none";

};

/* EGÉR VIZES EFFEKT */

document.addEventListener("mousemove", (e) => {

    let d = document.createElement("div");

    d.className = "trail";

    d.style.left = (e.pageX - 20) + "px";
    d.style.top = (e.pageY - 20) + "px";

    document.body.appendChild(d);

    setTimeout(() => {

        d.remove();

    }, 2000);

});

/* FOTO17 KATTINTÁS POZÍCIÓBAN */

document.addEventListener("click", (e) => {

    let flash = document.getElementById("flashImage");

    flash.style.left = (e.pageX - 130) + "px";
    flash.style.top = (e.pageY - 130) + "px";

    flash.style.opacity = 0.4;

    setTimeout(() => {

        flash.style.opacity = 0;

    }, 2000);

});

</script>

</body>
</html>
